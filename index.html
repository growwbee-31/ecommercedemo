<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Boss Shop</title>
  <link rel="stylesheet" href="app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand">Online Boss</div>
      <nav class="site-nav">
        <a href="#home" class="nav-link">Home</a>
        <a href="#shop" class="nav-link">Shop</a>
        <a href="#cart" class="nav-link">Cart</a>
        <a href="#login" class="nav-link auth-link" id="auth-link">Login</a>
      </nav>
      <button class="cart-button" id="cart-count" aria-label="Cart items">0</button>
    </header>

    <main id="app" class="main-content"></main>

    <footer class="site-footer">
      <p>Built with Supabase and vanilla JavaScript.</p>
    </footer>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
