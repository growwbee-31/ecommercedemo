<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Add Product</h2>

<input type="text" id="name" placeholder="Product Name"><br><br>
<input type="number" id="price" placeholder="Price"><br><br>

<input type="file" id="imageFile"><br><br>

<input type="text" id="description" placeholder="Description"><br><br>
<input type="number" id="stock" placeholder="Stock"><br><br>

<button onclick="addProduct()">Upload Product</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔥 Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC77v5f0WGY3JIi5vRl-Gb-BP6N3celETI",
  authDomain: "my-ecommerce-abab4.firebaseapp.com",
  projectId: "my-ecommerce-abab4",
  storageBucket: "my-ecommerce-abab4.appspot.com",
  messagingSenderId: "384779972877",
  appId: "1:384779972877:web:273cd2a762f56c89bec044"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 🚀 ADD PRODUCT
window.addProduct = async function() {

  const name = document.getElementById("name").value;
  const price = Number(document.getElementById("price").value);
  const file = document.getElementById("imageFile").files[0];
  const description = document.getElementById("description").value;
  const stock = Number(document.getElementById("stock").value);

  if (!name || !price || !file) {
    alert("Fill all required fields");
    return;
  }

  try {
    // 🔼 STEP 1: Upload image to Storage
    const imageRef = ref(storage, "products/" + Date.now() + "_" + file.name);
    await uploadBytes(imageRef, file);

    // 🔗 STEP 2: Get image URL
    const imageURL = await getDownloadURL(imageRef);

    // 💾 STEP 3: Save product in Firestore
    await addDoc(collection(db, "products"), {
      name,
      price,
      image: imageURL,
      description,
      stock
    });

    alert("Product uploaded successfully!");

  } catch (error) {
    console.error(error);
    alert("Error uploading product");
  }
};
</script>
</body>
</html>
