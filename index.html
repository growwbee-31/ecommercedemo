<!DOCTYPE html>
<html>
<head>
  <title>Supabase Grocery Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }

    .navbar{
      display:flex; justify-content:space-between;
      background:green; color:white; padding:15px;
    }

    .hero{
      text-align:center; padding:30px;
      background:#dfffe0;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px; padding:10px;
    }

    .card{
      background:white; padding:10px; border-radius:10px;
    }

    .card img{
      width:100%; height:100px; object-fit:cover;
      border-radius:8px;
    }

    button{
      padding:5px 10px;
      margin-top:5px;
      cursor:pointer;
    }

    .cart{
      position:fixed; right:0; top:0;
      width:260px; height:100%;
      background:white;
      display:none;
      padding:10px;
      overflow:auto;
    }

    .auth{
      padding:10px;
      background:white;
    }

    input{
      display:block;
      width:90%;
      margin:5px 0;
      padding:8px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h3>Grocery Store</h3>
  <div>
    <button onclick="showCart()">Cart 🛒</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="hero">
  <h2>Fresh Groceries Delivered</h2>
</div>

<div class="auth">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div id="products" class="grid"></div>

<div id="cart" class="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4 id="total"></h4>
  <button onclick="placeOrder()">Place Order</button>
  <button onclick="closeCart()">Close</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://hqspmulzlnxzoshzstkq.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxc3BtdWx6bG54em9zaHpzdGtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTg5NTksImV4cCI6MjA5MzQzNDk1OX0.931PQhqvclzK1DwJNtp46sGoYxDD_Kk4bPtdINg7yi4"
);

let cart = [];
let loaded = false;
window.products = [];

/* LOAD PRODUCTS (SAFE + RETRY) */
async function loadProducts(){
  if(loaded) return;
  loaded = true;

  try {
    const { data, error } = await supabaseClient
      .from("products")
      .select("*");

    if(error) throw error;

    window.products = data || [];

    let html = "";

    data.forEach(p=>{
      html += `
        <div class="card">
          <img src="${p.image}">
          <h4>${p.name}</h4>
          <p>₹${p.price}</p>
          <button onclick="addToCart('${p.id}')">Add</button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;

  } catch(err){
    console.log("Retrying...", err.message);

    loaded = false; // allow retry
    setTimeout(loadProducts, 3000);
  }
}

window.onload = loadProducts;

/* CART */
function addToCart(id){
  const product = window.products.find(p => p.id === id);
  if(!product) return;

  cart.push(product);
  alert("Added to cart");
}

function showCart(){
  document.getElementById("cart").style.display="block";

  let html="";
  let total=0;

  cart.forEach(c=>{
    total += c.price;
    html += `<p>${c.name} - ₹${c.price}</p>`;
  });

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText="Total: ₹"+total;
}

function closeCart(){
  document.getElementById("cart").style.display="none";
}

/* ORDER */
async function placeOrder(){
  const user = await supabaseClient.auth.getUser();

  if(!user.data.user){
    alert("Login first");
    return;
  }

  const total = cart.reduce((a,b)=>a+b.price,0);

  const { error } = await supabaseClient.from("orders").insert([
    {
      user_id: user.data.user.id,
      total_price: total,
      status: "pending"
    }
  ]);

  if(error){
    alert("Order failed");
    console.log(error);
    return;
  }

  alert("Order placed!");
  cart=[];
}

/* AUTH */
window.signup = async function(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  if(error){
    alert(error.message);
  } else {
    alert("Signup success");
  }
}

window.login = async function(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,password
  });

  if(error){
    alert(error.message);
  } else {
    alert("Login success");
  }
}

window.logout = async function(){
  await supabaseClient.auth.signOut();
  alert("Logged out");
}
</script>

</body>
</html>
